<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 게임 트렌드 대시보드</title>
<style>
:root{
  --bg:#0f1117; --card:#1a1d27; --card2:#222635; --text:#e8eaf0; --sub:#8b90a0;
  --accent:#6c8cff; --accent2:#ff6c8c; --border:#2a2e3d; --green:#4ade80;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif;min-height:100vh}
.wrap{max-width:1100px;margin:0 auto;padding:16px}
header{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;padding:8px 0 16px}
h1{font-size:1.35rem}
#updated{color:var(--sub);font-size:.8rem}
.tabs{display:flex;gap:6px;border-bottom:1px solid var(--border);margin-bottom:16px;overflow-x:auto}
.tab{background:none;border:none;color:var(--sub);font-size:1rem;padding:10px 16px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab.on{color:var(--text);border-bottom-color:var(--accent);font-weight:600}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.chip{background:var(--card);border:1px solid var(--border);color:var(--sub);border-radius:20px;padding:6px 14px;font-size:.85rem;cursor:pointer}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.vcard{background:var(--card);border-radius:12px;overflow:hidden;text-decoration:none;color:var(--text);border:1px solid var(--border);transition:transform .15s}
.vcard:hover{transform:translateY(-3px);border-color:var(--accent)}
.vcard img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:var(--card2)}
.vbody{padding:10px 12px}
.vrank{color:var(--accent);font-weight:700;font-size:.8rem}
.vtitle{font-size:.9rem;line-height:1.35;margin:4px 0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.vmeta{color:var(--sub);font-size:.78rem}
.news-item{display:block;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;text-decoration:none;color:var(--text)}
.news-item:hover{border-color:var(--accent)}
.news-title{font-size:.95rem;line-height:1.4}
.news-meta{color:var(--sub);font-size:.78rem;margin-top:4px}
.news-src{color:var(--accent);font-weight:600}
.news-ko{color:var(--accent);font-size:.85rem;margin-top:3px;line-height:1.4}
.steam-table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.steam-table th,.steam-table td{padding:9px 10px;border-bottom:1px solid var(--border);font-size:.86rem;text-align:right}
.steam-table th:first-child,.steam-table td:first-child,.steam-table th:nth-child(2),.steam-table td:nth-child(2){text-align:left}
.steam-table th{color:var(--sub);font-weight:600;background:var(--card2)}
.steam-table a{color:var(--text);text-decoration:none}
.steam-table a:hover{color:var(--accent)}
.steam-discovery{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:14px}
.steam-panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px}
.steam-panel h2{font-size:.92rem;margin-bottom:10px;color:var(--accent)}
.steam-candidates{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px;margin-bottom:14px}
.steam-candidate{display:block;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);text-decoration:none}
.steam-candidate:hover{border-color:var(--accent)}
.sc-head{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;margin-bottom:6px}
.sc-name{font-weight:700;font-size:.94rem;line-height:1.3}
.sc-score{color:var(--accent2);font-weight:700;font-size:.82rem;white-space:nowrap}
.sc-desc{color:var(--sub);font-size:.8rem;line-height:1.45;margin:6px 0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sc-tags{display:flex;gap:5px;flex-wrap:wrap;margin:6px 0}
.sc-tag{background:rgba(108,140,255,.14);border:1px solid rgba(108,140,255,.3);border-radius:6px;color:var(--accent);font-size:.72rem;padding:1px 6px}
.sc-link{display:block;color:var(--accent);font-size:.76rem;line-height:1.35;text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-row{display:grid;grid-template-columns:minmax(90px,1fr) minmax(120px,2fr) auto;gap:8px;align-items:center;color:var(--text);text-decoration:none;margin:8px 0}
.bar-name{font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{height:8px;background:var(--card2);border-radius:999px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.bar-val{font-size:.78rem;color:var(--sub);min-width:48px;text-align:right}
.signal{display:inline-block;margin-left:6px;color:var(--green);font-size:.72rem}
.up{color:var(--green)}.down{color:#f87171}.flat{color:var(--sub)}
.egrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.ecard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative}
.ecard.live{border-color:var(--green)}
.ecard.past{opacity:.45}
.dday{position:absolute;top:14px;right:14px;background:var(--accent);color:#fff;border-radius:8px;padding:3px 10px;font-weight:700;font-size:.85rem}
.dday.live{background:var(--green);color:#0f1117}
.dday.past{background:var(--card2);color:var(--sub)}
.ename{font-size:1.05rem;font-weight:700;margin-bottom:6px;padding-right:70px}
.ename a{color:var(--text);text-decoration:none}
.ename a:hover{color:var(--accent)}
.eregion{display:inline-block;font-size:.75rem;background:var(--card2);border-radius:6px;padding:2px 8px;margin-bottom:8px;color:var(--accent2)}
.einfo{color:var(--sub);font-size:.85rem;line-height:1.6}
.empty{color:var(--sub);text-align:center;padding:48px 16px;line-height:1.8}
.insight{background:linear-gradient(135deg,#1c2030,#232041);border:1px solid var(--accent);border-radius:14px;padding:16px 18px;margin-bottom:16px}
.insight h2{font-size:1rem;margin-bottom:10px;color:var(--accent)}
.insight ul{list-style:none}
.insight li{font-size:.9rem;line-height:1.55;padding:3px 0 3px 20px;position:relative}
.insight li::before{content:"✦";position:absolute;left:2px;color:var(--accent2);font-size:.75rem}
.rgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:8px;margin-top:12px}
.rbox{background:rgba(0,0,0,.25);border-radius:10px;padding:10px 12px}
.rbox b{display:block;font-size:.78rem;color:var(--accent2);margin-bottom:4px}
.rbox span{font-size:.83rem;line-height:1.5;color:var(--text)}
.hl-refs{margin:3px 0 5px}
.hl-ref{display:block;font-size:.78rem;color:var(--accent);text-decoration:none;line-height:1.5;opacity:.85}
.hl-ref:hover{text-decoration:underline}
.tags{display:block;margin-top:2px}
.tag{display:inline-block;background:rgba(108,140,255,.14);color:var(--accent);border:1px solid rgba(108,140,255,.3);border-radius:6px;padding:1px 8px;margin:6px 4px 0 0;font-size:.74rem}
.nb-region{margin-bottom:10px}
.nb-region:last-child{margin-bottom:0}
.nb-region b{display:block;font-size:.8rem;color:var(--accent2);margin-bottom:4px}
.watch{border-color:var(--accent2)}
.watch h2{color:var(--accent2)}
.wl-kw{margin-bottom:10px}
.wl-kw b{display:block;font-size:.85rem;color:var(--accent2);margin-bottom:3px}
.wl-kw p{font-size:.87rem;line-height:1.5}
.wl-hit{display:block;font-size:.82rem;color:var(--accent);text-decoration:none;padding:2px 0;line-height:1.4}
.wl-hit:hover{text-decoration:underline}
.wl-hit small{color:var(--sub)}
.forme{margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.forme b{display:block;font-size:.85rem;color:var(--green);margin-bottom:4px}
.warnbar{background:#3a2e12;border:1px solid #fbbf24;color:#fde68a;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:.85rem;line-height:1.5}
.cal-head{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:10px}
.cal-head b{font-size:1rem}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:20px}
.cal-dow{text-align:center;color:var(--sub);font-size:.75rem;padding:4px 0}
.cal-cell{background:var(--card);border:1px solid var(--border);border-radius:8px;min-height:64px;padding:4px;font-size:.7rem;overflow:hidden}
.cal-cell.blank{background:none;border:none}
.cal-cell.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.cal-d{color:var(--sub);font-size:.72rem}
.cal-ev{display:block;color:#fff;border-radius:4px;padding:1px 4px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:default}
@media(max-width:600px){.cal-cell{min-height:46px;padding:2px}.cal-ev{font-size:.58rem;padding:1px 2px}}
section{display:none}section.on{display:block}
@media(max-width:600px){
  .vgrid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
  h1{font-size:1.15rem}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🎮 게임 트렌드 대시보드</h1>
    <span id="updated"></span>
  </header>

  <div id="warn-box"></div>

  <div class="tabs">
    <button class="tab on" data-tab="trend">📈 트렌드</button>
    <button class="tab" data-tab="steam">🎮 Steam</button>
    <button class="tab" data-tab="news">📰 뉴스</button>
    <button class="tab" data-tab="events">📅 행사</button>
  </div>

  <section id="trend" class="on">
    <div id="insight-box"></div>
    <div id="watch-box"></div>
    <div class="chips" id="region-chips"></div>
    <div class="vgrid" id="videos"></div>
  </section>

  <section id="steam">
    <div id="steam-list"></div>
  </section>

  <section id="news">
    <div id="news-insight"></div>
    <div class="chips" id="news-chips"></div>
    <div id="news-list"></div>
  </section>

  <section id="events">
    <div id="calendar"></div>
    <div class="egrid" id="event-list"></div>
  </section>
</div>

<script>
let DATA = null, EVENTS = [], curRegion = null, curSrc = 'all', steamMode = 'rising';

const fmt = n => n >= 100000000 ? (n/100000000).toFixed(1)+'억' : n >= 10000 ? (n/10000).toFixed(1)+'만' : n.toLocaleString();
const esc = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };
const timeAgo = iso => {
  if(!iso) return '';
  const diff = (Date.now() - new Date(iso)) / 3600000;
  if (diff < 1) return '방금'; if (diff < 24) return Math.floor(diff)+'시간 전';
  return Math.floor(diff/24)+'일 전';
};

document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
  document.querySelectorAll('section').forEach(x => x.classList.remove('on'));
  t.classList.add('on');
  document.getElementById(t.dataset.tab).classList.add('on');
});

const REGION_LABEL = {KR:'🇰🇷 한국', NA:'🇺🇸 북미', JP:'🇯🇵 일본', CN:'🇨🇳 중국', common:'🌏 공통 트렌드'};
function renderInsights(){
  const ins = DATA.insights;
  if (!ins || (!(ins.highlights||[]).length && !Object.keys(ins.regional||{}).length)) return;
  const hl = (ins.highlights||[]).map(h => {
    const text = typeof h === 'string' ? h : (h?.text || '');
    if (!text) return '';
    const refs = ((typeof h === 'object' && h?.news_refs) || [])
      .map(i => (DATA.news||[])[i]).filter(Boolean).slice(0,3)
      .map(a => `<a class="hl-ref" href="${esc(a.url)}" target="_blank" rel="noopener">📎 ${esc(a.title_ko||a.title)}</a>`).join('');
    return `<li>${esc(text)}${refs?`<div class="hl-refs">${refs}</div>`:''}</li>`;
  }).join('');
  const rg = Object.entries(ins.regional||{})
    .map(([k,v]) => {
      const sum = typeof v === 'string' ? v : (v?.summary || '');
      const tags = (typeof v === 'object' && v?.tags) || [];
      if (!sum || sum === '데이터 부족') return '';
      return `<div class="rbox"><b>${REGION_LABEL[k]||esc(k)}</b><span>${esc(sum)}</span>${
        tags.length?`<div class="tags">${tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`:''}</div>`;
    }).join('');
  document.getElementById('insight-box').innerHTML = `
    <div class="insight">
      <h2>💡 오늘의 인사이트</h2>
      ${hl ? `<ul>${hl}</ul>` : ''}
      ${rg ? `<div class="rgrid">${rg}</div>` : ''}
      ${(ins.for_me||[]).length ? `<div class="forme"><b>🧭 기획자 관점 시사점</b><ul>${
        ins.for_me.map(h=>`<li>${esc(h)}</li>`).join('')}</ul></div>` : ''}
    </div>`;
}

function renderWatchlist(){
  const notes = (DATA.insights||{}).watchlist || [];
  const hits = DATA.watchlist_hits || [];
  if (!notes.length && !hits.length) return;
  const byKw = {};
  hits.forEach(h => { (byKw[h.keyword] = byKw[h.keyword] || []).push(h); });
  const kws = [...new Set([...notes.map(n=>n.keyword), ...Object.keys(byKw)])];
  const body = kws.map(k => {
    const note = notes.find(n => n.keyword === k);
    const links = (byKw[k]||[]).slice(0,4).map(h =>
      `<a class="wl-hit" href="${esc(h.url)}" target="_blank" rel="noopener">${h.type==='video'?'▶':'📄'} ${esc(h.title)} <small>· ${esc(h.source)}</small></a>`).join('');
    return `<div class="wl-kw"><b>${esc(k)}</b>${note?`<p>${esc(note.note)}</p>`:''}${links}</div>`;
  }).join('');
  document.getElementById('watch-box').innerHTML =
    `<div class="insight watch"><h2>🎯 내 워치리스트</h2>${body}</div>`;
}

function renderRegions(){
  const regions = [];
  for (const [code, r] of Object.entries(DATA.youtube || {}))
    if ((r.videos||[]).length) regions.push({key: code, label: r.name});
  if ((DATA.bilibili||[]).length) regions.push({key: 'CN', label: '중국(Bilibili)'});
  const box = document.getElementById('region-chips');
  if (!regions.length){
    document.getElementById('videos').innerHTML =
      '<div class="empty" style="grid-column:1/-1">아직 트렌드 데이터가 없습니다.<br>YouTube API 키 등록 후 수집이 실행되면 표시됩니다.</div>';
    return;
  }
  curRegion = regions[0].key;
  box.innerHTML = regions.map(r =>
    `<button class="chip${r.key===curRegion?' on':''}" data-r="${r.key}">${r.label}</button>`).join('');
  box.querySelectorAll('.chip').forEach(c => c.onclick = () => {
    curRegion = c.dataset.r;
    box.querySelectorAll('.chip').forEach(x => x.classList.toggle('on', x===c));
    renderVideos();
  });
  renderVideos();
}

function renderVideos(){
  const vids = curRegion==='CN' ? DATA.bilibili : (DATA.youtube[curRegion]?.videos || []);
  document.getElementById('videos').innerHTML = vids.map((v,i) => `
    <a class="vcard" href="${esc(v.url)}" target="_blank" rel="noopener">
      ${v.thumbnail ? `<img src="${esc(v.thumbnail)}" loading="lazy" referrerpolicy="no-referrer" alt="">` : ''}
      <div class="vbody">
        <span class="vrank">#${i+1}</span>
        <div class="vtitle">${esc(v.title)}</div>
        <div class="vmeta">${esc(v.channel)} · 조회 ${fmt(v.views)}${v.publishedAt ? ' · '+timeAgo(v.publishedAt) : ''}</div>
      </div>
    </a>`).join('');
}

const signed = n => n == null ? '-' : (n > 0 ? '+' : '') + fmt(n);
const norm = s => (s||'').toLowerCase().replace(/[^a-z0-9가-힣]/g,'');
function relatedSteamItems(g){
  const key = norm(g.name).slice(0,18);
  if (key.length < 4) return [];
  const items = [
    ...(DATA.news||[]).map(a => ({type:'뉴스', title:a.title_ko||a.title, url:a.url, text:a.title + ' ' + (a.title_ko||'')})),
    ...Object.values(DATA.youtube||{}).flatMap(r => (r.videos||[]).map(v => ({type:'영상', title:v.title, url:v.url, text:v.title}))),
    ...(DATA.bilibili||[]).map(v => ({type:'영상', title:v.title, url:v.url, text:v.title})),
  ];
  return items.filter(x => norm(x.text).includes(key));
}
function steamSignals(g){
  const hits = relatedSteamItems(g).length;
  return hits ? [`뉴스/영상 ${hits}`] : [];
}
function discoveryScore(g){
  const evergreen = g.rank <= 5 ? 25 : g.rank <= 15 ? 10 : 0;
  return Math.round(
    Math.max(0, g.weekly_rank_change||0) * 3 +
    Math.min(Math.max(0, g.delta_percent||0), 100) * 1.5 +
    Math.log10(Math.max(1, g.delta_current||0)) * 8 +
    relatedSteamItems(g).length * 12 -
    evergreen
  );
}
function renderCandidates(games){
  const rows = games.map(g => ({...g, score: discoveryScore(g), related: relatedSteamItems(g).slice(0,3)}))
    .filter(g => g.score > 0)
    .sort((a,b) => b.score - a.score)
    .slice(0,6);
  if (!rows.length) return '';
  return `<div class="steam-panel"><h2>오늘의 발견 후보</h2><div class="steam-candidates">${rows.map(g => {
    const tags = [
      (g.weekly_rank_change||0) > 0 ? `주간 ▲${g.weekly_rank_change}` : '',
      (g.delta_percent||0) > 0 ? `동접 +${g.delta_percent}%` : '',
      g.related.length ? `뉴스/영상 ${g.related.length}` : '',
    ].filter(Boolean);
    return `<a class="steam-candidate" href="${esc(g.url)}" target="_blank" rel="noopener">
      <div class="sc-head"><span class="sc-name">${esc(g.name)}</span><span class="sc-score">${g.score}</span></div>
      ${g.description ? `<div class="sc-desc">${esc(g.description)}</div>` : ''}
      <div class="sc-tags">${tags.map(t=>`<span class="sc-tag">${esc(t)}</span>`).join('')}</div>
      ${g.related.map(r=>`<span class="sc-link">${esc(r.type)} · ${esc(r.title)}</span>`).join('')}
    </a>`;
  }).join('')}</div></div>`;
}

function barPanel(title, rows, valueFn, labelFn){
  if (!rows.length) return '';
  const max = Math.max(...rows.map(valueFn), 1);
  return `<div class="steam-panel"><h2>${title}</h2>${rows.map(g => {
    const signals = steamSignals(g);
    return `<a class="bar-row" href="${esc(g.url)}" target="_blank" rel="noopener">
      <span class="bar-name">${esc(g.name)}${signals.length?`<span class="signal">● ${esc(signals.join(', '))}</span>`:''}</span>
      <span class="bar-track"><span class="bar-fill" style="width:${Math.max(4, valueFn(g)/max*100)}%"></span></span>
      <span class="bar-val">${labelFn(g)}</span>
    </a>`;
  }).join('')}</div>`;
}

function renderSteam(){
  const games = (DATA.steam||{}).games || [];
  const box = document.getElementById('steam-list');
  if (!games.length){
    box.innerHTML = '<div class="empty">아직 Steam Top 100 데이터가 없습니다.</div>';
    return;
  }
  const rising = games.filter(g => (g.weekly_rank_change||0) > 0 || (g.delta_current||0) > 0)
    .sort((a,b) =>
      (b.weekly_rank_change||-999) - (a.weekly_rank_change||-999) ||
      (b.delta_percent||-999) - (a.delta_percent||-999) ||
      (b.delta_current||0) - (a.delta_current||0));
  const list = steamMode === 'rising' ? rising : games;
  const modeBtns = `<div class="chips">
    <button class="chip${steamMode==='rising'?' on':''}" data-steam-mode="rising">급상승</button>
    <button class="chip${steamMode==='top'?' on':''}" data-steam-mode="top">동접 Top 100</button>
  </div>`;
  if (!list.length){
    box.innerHTML = modeBtns + '<div class="empty">아직 상승 데이터가 없습니다.<br>다음 수집부터 직전 대비 증감이 표시됩니다.</div>';
    bindSteamMode();
    return;
  }
  const weekly = games.filter(g => (g.weekly_rank_change||0) > 0).slice()
    .sort((a,b) => (b.weekly_rank_change||0) - (a.weekly_rank_change||0)).slice(0,10);
  const surging = games.filter(g => (g.delta_percent||0) > 0 && g.current > 1000).slice()
    .sort((a,b) => (b.delta_percent||0) - (a.delta_percent||0)).slice(0,10);
  const discovery = renderCandidates(games) + `<div class="steam-discovery">${
    barPanel('주간 순위 상승', weekly, g => g.weekly_rank_change||0, g => '▲'+g.weekly_rank_change)
  }${
    barPanel('동접 증가율', surging, g => g.delta_percent||0, g => '+'+g.delta_percent+'%')
  }</div>`;
  box.innerHTML = `<table class="steam-table">
    <thead><tr><th>순위</th><th>게임</th><th>현재 동접</th><th>동접 증감</th><th>주간</th><th>직전</th><th>오늘 최고</th></tr></thead>
    <tbody>${list.map(g => {
      const cls = g.delta_current > 0 ? 'up' : g.delta_current < 0 ? 'down' : 'flat';
      const pct = g.delta_percent == null ? '' : ` (${g.delta_percent > 0 ? '+' : ''}${g.delta_percent}%)`;
      const wk = g.weekly_rank_change == null ? '-' : g.weekly_rank_change === 0 ? '-' : (g.weekly_rank_change > 0 ? '▲' : '▼') + Math.abs(g.weekly_rank_change);
      return `<tr>
        <td>#${g.rank}</td>
        <td><a href="${esc(g.url)}" target="_blank" rel="noopener">${esc(g.name)}</a></td>
        <td>${fmt(g.current)}</td>
        <td class="${cls}">${signed(g.delta_current)}${pct}</td>
        <td class="${g.weekly_rank_change > 0 ? 'up' : g.weekly_rank_change < 0 ? 'down' : 'flat'}">${wk}</td>
        <td class="${g.delta_rank > 0 ? 'up' : g.delta_rank < 0 ? 'down' : 'flat'}">${g.delta_rank == null ? '-' : g.delta_rank === 0 ? '-' : (g.delta_rank > 0 ? '▲' : '▼') + Math.abs(g.delta_rank)}</td>
        <td>${fmt(g.peak_today)}</td>
      </tr>`;
    }).join('')}</tbody></table>`;
  box.insertAdjacentHTML('afterbegin', modeBtns + discovery);
  bindSteamMode();
}

function bindSteamMode(){
  document.querySelectorAll('[data-steam-mode]').forEach(b => b.onclick = () => {
    steamMode = b.dataset.steamMode;
    renderSteam();
  });
}

function renderNewsChips(){
  const srcs = [...new Set((DATA.news||[]).map(a => a.source))];
  const box = document.getElementById('news-chips');
  if (!srcs.length){
    document.getElementById('news-list').innerHTML = '<div class="empty">아직 뉴스 데이터가 없습니다.</div>';
    return;
  }
  box.innerHTML = `<button class="chip on" data-s="all">전체</button>` +
    srcs.map(s => `<button class="chip" data-s="${esc(s)}">${esc(s)}</button>`).join('');
  box.querySelectorAll('.chip').forEach(c => c.onclick = () => {
    curSrc = c.dataset.s;
    box.querySelectorAll('.chip').forEach(x => x.classList.toggle('on', x===c));
    renderNews();
  });
  renderNews();
}

function renderNews(){
  const list = (DATA.news||[]).filter(a => curSrc==='all' || a.source===curSrc).slice(0,80);
  document.getElementById('news-list').innerHTML = list.map(a => `
    <a class="news-item" href="${esc(a.url)}" target="_blank" rel="noopener">
      <div class="news-title">${esc(a.title)}</div>
      ${a.title_ko ? `<div class="news-ko">🇰🇷 ${esc(a.title_ko)}</div>` : ''}
      <div class="news-meta"><span class="news-src">${esc(a.source)}</span> · ${timeAgo(a.publishedAt)}</div>
    </a>`).join('');
}

const NB_LABEL = {KR:'🇰🇷 국내', NA:'🌎 북미/서구권', JP:'🇯🇵 일본', CN:'🇨🇳 중국'};
function renderNewsBrief(){
  const nb = (DATA.insights||{}).news_brief;
  if (!nb) return;
  let body = '';
  if (Array.isArray(nb)) {  // 구버전 데이터 호환
    if (!nb.length) return;
    body = `<ul>${nb.map(h=>`<li>${esc(h)}</li>`).join('')}</ul>`;
  } else {
    body = Object.entries(nb).map(([k,v]) => {
      const sums = (v?.summary || []).filter(x => x && x !== '데이터 부족');
      if (!sums.length) return '';
      const tg = v?.tags||[];
      return `<div class="nb-region"><b>${NB_LABEL[k]||esc(k)}</b><ul>${
        sums.map(h=>`<li>${esc(h)}</li>`).join('')}</ul>${
        tg.length?`<div class="tags">${tg.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`:''}</div>`;
    }).join('');
  }
  if (!body) return;
  document.getElementById('news-insight').innerHTML =
    `<div class="insight"><h2>📰 오늘의 뉴스 브리핑</h2>${body}</div>`;
}

const EV_COLORS = ['#6c8cff','#ff6c8c','#4ade80','#fbbf24','#a78bfa','#34d399','#f87171','#38bdf8'];
let calYM = null;
function renderCalendar(){
  if(!calYM){ const t=new Date(); calYM=[t.getFullYear(), t.getMonth()]; }
  const [y,m]=calYM;
  const startDow=new Date(y,m,1).getDay(), dim=new Date(y,m+1,0).getDate();
  const now=new Date();
  let cells='';
  for(let i=0;i<startDow;i++) cells+='<div class="cal-cell blank"></div>';
  for(let d=1;d<=dim;d++){
    const date=new Date(y,m,d);
    const evs=EVENTS.map((e,i)=>({...e,i})).filter(e=>
      new Date(e.start+'T00:00:00')<=date && date<=new Date(e.end+'T00:00:00'));
    const isToday=now.getFullYear()===y&&now.getMonth()===m&&now.getDate()===d;
    cells+=`<div class="cal-cell${isToday?' today':''}"><span class="cal-d">${d}</span>${
      evs.map(e=>`<span class="cal-ev" style="background:${EV_COLORS[e.i%EV_COLORS.length]}" title="${esc(e.name)}">${esc(e.name.replace(/\s*\(.*\)/,'').slice(0,10))}</span>`).join('')
    }</div>`;
  }
  document.getElementById('calendar').innerHTML=`
    <div class="cal-head"><button class="chip" id="cal-prev">◀</button><b>${y}년 ${m+1}월</b><button class="chip" id="cal-next">▶</button></div>
    <div class="cal-grid">${['일','월','화','수','목','금','토'].map(x=>`<div class="cal-dow">${x}</div>`).join('')}${cells}</div>`;
  document.getElementById('cal-prev').onclick=()=>{calYM=m===0?[y-1,11]:[y,m-1];renderCalendar();};
  document.getElementById('cal-next').onclick=()=>{calYM=m===11?[y+1,0]:[y,m+1];renderCalendar();};
}

function renderEvents(){
  renderCalendar();
  const today = new Date(); today.setHours(0,0,0,0);
  const evs = EVENTS.map(e => {
    const s = new Date(e.start+'T00:00:00'), en = new Date(e.end+'T00:00:00');
    const d = Math.round((s - today) / 86400000);
    let state, label;
    if (today >= s && today <= en){ state='live'; label='진행 중'; }
    else if (d > 0){ state='up'; label='D-'+d; }
    else { state='past'; label='종료'; }
    return {...e, state, label, sortKey: state==='live' ? -1e9 : state==='up' ? d : 1e9 - +s};
  }).sort((a,b) => a.sortKey - b.sortKey);

  document.getElementById('event-list').innerHTML = evs.map(e => `
    <div class="ecard ${e.state==='live'?'live':e.state==='past'?'past':''}">
      <span class="dday ${e.state==='live'?'live':e.state==='past'?'past':''}">${e.label}</span>
      <div class="ename"><a href="${esc(e.url)}" target="_blank" rel="noopener">${esc(e.name)}</a></div>
      <span class="eregion">${esc(e.region)}</span>
      <div class="einfo">
        📍 ${esc(e.location)}<br>
        🗓 ${e.start}${e.end !== e.start ? ' ~ ' + e.end : ''}
        ${e.note ? '<br>💬 ' + esc(e.note) : ''}
      </div>
    </div>`).join('');
}

async function init(){
  try {
    const [d, ev] = await Promise.all([
      fetch('data.json?t='+Date.now()).then(r => r.json()).catch(() => ({youtube:{},steam:{games:[]},bilibili:[],news:[]})),
      fetch('events.json?t='+Date.now()).then(r => r.json()).catch(() => ({events:[]})),
    ]);
    DATA = d; EVENTS = ev.events || [];
    if (d.generated_at)
      document.getElementById('updated').textContent =
        '업데이트: ' + new Date(d.generated_at).toLocaleString('ko-KR', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
    if ((d.warnings||[]).length)
      document.getElementById('warn-box').innerHTML =
        `<div class="warnbar">⚠️ ${d.warnings.map(esc).join('<br>⚠️ ')}</div>`;
    renderInsights();
    renderWatchlist();
    renderSteam();
    renderNewsBrief();
    renderRegions();
    renderNewsChips();
    renderEvents();
  } catch(e) {
    document.querySelector('.wrap').insertAdjacentHTML('beforeend',
      '<div class="empty">데이터를 불러오지 못했습니다: '+esc(e.message)+'</div>');
  }
}
init();
</script>
